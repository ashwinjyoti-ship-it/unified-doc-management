  />

  <!-- Collaborator node -->
  <circle cx="62" cy="78" r="7" fill="#FCF9F7"/>
  <circle cx="62" cy="76.2" r="2.2" fill="#244632"/>
  <path
    d="M58.8 80.2c0.8 1.6 2.4 2.6 4.2 2.6s3.4-1 4.2-2.6"
