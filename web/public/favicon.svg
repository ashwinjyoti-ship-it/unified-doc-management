<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="UnifiedDocs">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="92" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#004228"/>
      <stop offset="100%" stop-color="#325A41"/>
    </linearGradient>
    <linearGradient id="paper" x1="22" y1="18" x2="68" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCF9F7"/>
      <stop offset="100%" stop-color="#F4F1ED"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Document -->
  <rect x="20" y="16" width="48" height="60" rx="7" fill="url(#paper)"/>
  <path d="M60 16h8v8l-8-8z" fill="#DCDED6"/>

  <!-- Text lines -->
  <rect x="27" y="29" width="28" height="3.5" rx="1.75" fill="#97B79E" opacity="0.55"/>
  <rect x="27" y="38" width="22" height="3" rx="1.5" fill="#ADACA6" opacity="0.42"/>
  <rect x="27" y="46" width="26" height="3" rx="1.5" fill="#ADACA6" opacity="0.38"/>
  <rect x="27" y="54" width="18" height="3" rx="1.5" fill="#ADACA6" opacity="0.32"/>

  <!-- Agent instruction highlight -->
  <rect x="27" y="62" width="24" height="6" rx="3" fill="#97B79E" opacity="0.28"/>

  <!-- Collaboration link -->
  <path
    d="M56 58 C64 52 70 56 74 64"
    fill="none"
    stroke="#FCF9F7"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.45"
  />

  <!-- AI agent orb -->
  <circle cx="78" cy="66" r="15" fill="#97B79E"/>
  <circle cx="78" cy="66" r="15" fill="none" stroke="#FCF9F7" stroke-width="1.5" opacity="0.35"/>
  <path
    d="M78 58.5l1.4 4.1 4.3 1.1-4.3 1.1L78 69l-1.4-4.2-4.3-1.1 4.3-1.1z"
