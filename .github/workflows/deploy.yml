name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ash-doc
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Bundle Pages worker
        run: npm run build:pages-worker

      - name: Create D1 database (if missing)
        working-directory: worker
        run: npx wrangler d1 create unified-doc-db --location=wnam || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync D1 database ID into wrangler config
        working-directory: worker
        run: |
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | node -e "
            const input = require('fs').readFileSync(0, 'utf8').trim();
            if (!input) process.exit(1);
            const data = JSON.parse(input);
            const rows = Array.isArray(data) ? data : (data.result || []);
            const db = rows.find((row) => row.name === 'unified-doc-db');
            if (!db?.uuid) process.exit(1);
            process.stdout.write(db.uuid);
          ") || grep -o '"database_id": "[^"]*"' wrangler.jsonc | head -1 | cut -d'"' -f4
          node -e "
            const fs = require('fs');
            const path = 'wrangler.jsonc';
            const config = fs.readFileSync(path, 'utf8').replace(
              /\"database_id\":\\s*\"[^\"]+\"/,
              '\"database_id\": \"' + process.argv[1] + '\"'
            );
            fs.writeFileSync(path, config);
          " "$DB_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        working-directory: worker
        run: npx wrangler d1 migrations apply unified-doc-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Register Durable Objects (Worker deploy)
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set JWT secret for Worker
        working-directory: worker
        run: printf '%s' "$JWT_SECRET" | npx wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Set JWT secret for Pages
        working-directory: worker
        run: printf '%s' "$JWT_SECRET" | npx wrangler pages secret put JWT_SECRET --project-name=ash-doc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Create Pages project (if missing)
        working-directory: worker
        run: npx wrangler pages project create ash-doc --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to ash-doc.pages.dev
        working-directory: worker
        run: npx wrangler pages deploy ../web/dist --project-name=ash-doc --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "Live at https://ash-doc.pages.dev"
          echo "Worker fallback at https://ash-doc.<account>.workers.dev"
